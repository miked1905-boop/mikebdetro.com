<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mike D — Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --card-hover: #1a1a1a;
      --border: #222;
      --border-hover: #333;
      --text: #f5f5f5;
      --text-muted: #888;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,.25);
      --radius: 16px;
    }

    html { scroll-behavior: smooth }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.25rem 4rem;
      overflow-x: hidden;
    }

    /* ── animated gradient blob ── */
    .blob {
      position: fixed;
      top: -120px;
      width: 420px; height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: pulse 6s ease-in-out infinite alternate;
    }
    @keyframes pulse { to { opacity: .5; transform: scale(1.15) } }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
    }

    /* ── avatar ── */
    .avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      display: grid;
      place-items: center;
      font-size: 2.25rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px var(--accent);
      user-select: none;
      overflow: hidden;
    }
    .avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile { text-align: center }
    .profile h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -.02em }
    .profile p {
      margin-top: .35rem;
      font-size: .9rem;
      color: var(--text-muted);
      max-width: 320px;
      line-height: 1.5;
    }

    /* ── socials row ── */
    .socials { display: flex; gap: .75rem }
    .socials a {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      color: var(--text-muted);
      text-decoration: none;
      transition: all .2s;
    }
    .socials a:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--accent-glow);
    }
    .socials svg { width: 18px; height: 18px; fill: currentColor }

    /* ── link cards ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      transition: all .25s cubic-bezier(.4,0,.2,1);
      position: relative;
      overflow: hidden;
    }
    .link-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .25s;
    }
    .link-card:hover {
      border-color: var(--border-hover);
      background: var(--card-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }
    .link-card:hover::before { opacity: 1 }

    .link-icon {
      position: relative;
      width: 42px; height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-size: 1.2rem;
    }

    .link-info { position: relative; flex: 1; min-width: 0 }
    .link-info .title { font-weight: 600; font-size: .95rem }
    .link-info .desc {
      font-size: .8rem;
      color: var(--text-muted);
      margin-top: .15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      position: relative;
      color: var(--text-muted);
      transition: transform .2s, color .2s;
    }
    .link-card:hover .link-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    footer {
      margin-top: 3rem;
      font-size: .75rem;
      color: var(--text-muted);
      text-align: center;
      opacity: .6;
    }

    /* ── entrance animations ── */
    .container > * { animation: fadeUp .5s ease both }
    .container > *:nth-child(1) { animation-delay: .05s }
    .container > *:nth-child(2) { animation-delay: .1s }
    .container > *:nth-child(3) { animation-delay: .15s }
    .container > *:nth-child(4) { animation-delay: .2s }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px) }
      to   { opacity: 1; transform: translateY(0) }
    }

    @media (max-width: 480px) {
      body { padding: 2rem 1rem 3rem }
      .avatar { width: 80px; height: 80px; font-size: 1.85rem }
      .profile h1 { font-size: 1.3rem }
    }

    /* ═══════════════════════════════════════════
       EDITOR PANEL STYLES
       ═══════════════════════════════════════════ */

    /* floating edit button — hidden until authenticated */
    .edit-fab {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      display: none;
      place-items: center;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 4px 20px var(--accent-glow);
      transition: transform .2s, box-shadow .2s;
    }
    .edit-fab.visible { display: grid }
    .edit-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px var(--accent-glow) }
    .edit-fab svg { width: 22px; height: 22px }

    /* overlay */
    .editor-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 1001;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .editor-overlay.open { opacity: 1; pointer-events: auto }

    /* panel */
    .editor-panel {
      position: fixed;
      top: 0; right: 0;
      width: 380px;
      height: 100%;
      background: #111;
      border-left: 1px solid var(--border);
      z-index: 1002;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .editor-panel.open { transform: translateX(0) }

    @media (max-width: 480px) {
      .editor-panel { width: 100% }
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .editor-header h2 { font-size: 1.1rem; font-weight: 700 }
    .editor-close {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all .15s;
    }
    .editor-close:hover { background: var(--card); color: var(--text) }

    .editor-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    .editor-section h3 {
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      margin-bottom: .75rem;
    }

    .editor-field { margin-bottom: .75rem }
    .editor-field label {
      display: block;
      font-size: .8rem;
      color: var(--text-muted);
      margin-bottom: .3rem;
    }
    .editor-field input,
    .editor-field textarea {
      width: 100%;
      padding: .6rem .75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: .85rem;
      outline: none;
      transition: border-color .15s;
    }
    .editor-field input:focus,
    .editor-field textarea:focus {
      border-color: var(--accent);
    }
    .editor-field textarea { resize: vertical; min-height: 60px }

    /* accent color swatches */
    .color-swatches {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .color-swatch {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform .15s, border-color .15s;
    }
    .color-swatch:hover { transform: scale(1.15) }
    .color-swatch.active { border-color: #fff; transform: scale(1.15) }

    /* link card editor items */
    .editor-link-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: .75rem;
      position: relative;
    }
    .editor-link-item .editor-field { margin-bottom: .6rem }
    .editor-link-item .editor-field:last-child { margin-bottom: 0 }

    .link-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .75rem;
    }
    .link-item-header span {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
    }
    .link-item-actions { display: flex; gap: .35rem }
    .link-item-actions button {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all .15s;
    }
    .link-item-actions button:hover { background: var(--card); color: var(--text) }
    .link-item-actions button.delete-btn:hover { color: #ef4444; border-color: #ef4444 }

    /* icon picker */
    .icon-picker {
      display: flex;
      gap: .4rem;
      flex-wrap: wrap;
    }
    .icon-picker button {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all .15s;
    }
    .icon-picker button:hover { color: var(--text); border-color: var(--border-hover) }
    .icon-picker button.active { border-color: var(--accent); color: var(--accent) }
    .icon-picker button svg { width: 16px; height: 16px }

    /* link color mini swatches */
    .link-color-swatches {
      display: flex;
      gap: .35rem;
      flex-wrap: wrap;
    }
    .link-color-swatch {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform .15s, border-color .15s;
    }
    .link-color-swatch:hover { transform: scale(1.15) }
    .link-color-swatch.active { border-color: #fff }

    /* avatar upload in editor */
    .avatar-upload-area {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: .75rem;
    }
    .avatar-preview {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      display: grid;
      place-items: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar-preview img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .avatar-upload-btns {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }
    .avatar-upload-btn,
    .avatar-remove-btn {
      padding: .45rem .85rem;
      border-radius: 8px;
      font-family: inherit;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      border: 1px solid var(--border);
    }
    .avatar-upload-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .avatar-upload-btn:hover { opacity: .85 }
    .avatar-remove-btn {
      background: transparent;
      color: var(--text-muted);
    }
    .avatar-remove-btn:hover { color: #ef4444; border-color: #ef4444 }
    .avatar-file-input { display: none }

    /* PIN modal */
    .pin-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 2000;
      display: none;
      place-items: center;
    }
    .pin-modal.open { display: grid }
    .pin-box {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      width: 320px;
      text-align: center;
    }
    .pin-box h3 { font-size: 1.1rem; margin-bottom: .35rem }
    .pin-box p { font-size: .8rem; color: var(--text-muted); margin-bottom: 1.25rem }
    .pin-input {
      width: 100%;
      padding: .7rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 1.2rem;
      text-align: center;
      letter-spacing: .5em;
      outline: none;
      transition: border-color .15s;
    }
    .pin-input:focus { border-color: var(--accent) }
    .pin-input.error { border-color: #ef4444; animation: shake .4s }
    @keyframes shake {
      0%,100% { transform: translateX(0) }
      25% { transform: translateX(-6px) }
      75% { transform: translateX(6px) }
    }
    .pin-submit {
      margin-top: 1rem;
      width: 100%;
      padding: .7rem;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .pin-submit:hover { opacity: .85 }
    .pin-cancel {
      margin-top: .6rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: .8rem;
      cursor: pointer;
    }
    .pin-cancel:hover { color: var(--text) }

    /* export button in editor */
    .export-btn {
      width: 100%;
      padding: .75rem;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .export-btn:hover { opacity: .85 }
    .export-desc {
      font-size: .75rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: .4rem;
      line-height: 1.4;
    }

    .add-link-btn {
      width: 100%;
      padding: .75rem;
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: 12px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .add-link-btn:hover { border-color: var(--accent); color: var(--accent) }
  </style>
</head>
<body>

  <div class="blob"></div>

  <div class="container">
    <div class="avatar" id="avatar"></div>
    <div class="profile">
      <h1 id="profileName"></h1>
      <p id="profileBio"></p>
    </div>
    <div class="socials" id="socials"></div>
    <div class="links" id="links"></div>
  </div>

  <footer id="footer"></footer>

  <!-- Edit FAB -->
  <button class="edit-fab" id="editFab" aria-label="Edit page">
    <svg fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
  </button>

  <!-- Editor overlay -->
  <div class="editor-overlay" id="editorOverlay"></div>

  <!-- Editor Panel -->
  <div class="editor-panel" id="editorPanel">
    <div class="editor-header">
      <h2>Edit Your Page</h2>
      <button class="editor-close" id="editorClose">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="editor-body" id="editorBody">
      <!-- Filled by JS -->
    </div>
  </div>

  <!-- PIN Modal -->
  <div class="pin-modal" id="pinModal">
    <div class="pin-box">
      <h3>Enter PIN</h3>
      <p>Authenticate to edit this page</p>
      <input type="password" class="pin-input" id="pinInput" maxlength="10" placeholder="----" autocomplete="off" />
      <button class="pin-submit" id="pinSubmit">Unlock</button>
      <button class="pin-cancel" id="pinCancel">Cancel</button>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════
// SVG ICON LIBRARY
// ═══════════════════════════════════════════
const ICONS = {
  code:    '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M16 18l6-6-6-6"/><path d="M8 6l-6 6 6 6"/></svg>',
  chat:    '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>',
  monitor: '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>',
  play:    '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
  mail:    '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
  link:    '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>',
  globe:   '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>',
  star:    '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>',
  book:    '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>',
  music:   '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>',
  camera:  '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>',
  heart:   '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>',
};
const ICON_KEYS = Object.keys(ICONS);

let config;

function loadConfig() {
  try {
    const saved = localStorage.getItem('linkme_config');
    if (saved) {
      config = JSON.parse(saved);
      // ensure all keys exist (migration-safe)
      config.profile = { ...DEFAULT_CONFIG.profile, ...config.profile };
      config.theme   = { ...DEFAULT_CONFIG.theme, ...config.theme };
      if (!Array.isArray(config.links)) config.links = DEFAULT_CONFIG.links;
      // migrate old object-style socials to array
      if (!Array.isArray(config.socials)) {
        const old = config.socials || {};
        config.socials = [];
        if (old.github)   config.socials.push({ icon: 'github',   label: 'GitHub',     url: old.github });
        if (old.twitter)  config.socials.push({ icon: 'twitter',  label: 'X / Twitter', url: old.twitter });
        if (old.linkedin) config.socials.push({ icon: 'linkedin', label: 'LinkedIn',    url: old.linkedin });
        if (old.email)    config.socials.push({ icon: 'email',    label: 'Email',       url: old.email });
      }
    } else {
      config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    }
  } catch {
    config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  }
}

function saveConfig() {
  localStorage.setItem('linkme_config', JSON.stringify(config));
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function iconBg(color) {
  const r = parseInt(color.slice(1,3),16);
  const g = parseInt(color.slice(3,5),16);
  const b = parseInt(color.slice(5,7),16);
  return `rgba(${r},${g},${b},.15)`;
}

function applyTheme() {
  const accent = config.theme.accent;
  document.documentElement.style.setProperty('--accent', accent);
  document.documentElement.style.setProperty('--accent-glow', hexToRgba(accent, .25));
}

function renderPage() {
  applyTheme();

  // Avatar
  const avatarEl = document.getElementById('avatar');
  if (config.profile.image) {
    avatarEl.innerHTML = `<img src="${config.profile.image}" alt="Profile">`;
  } else {
    avatarEl.textContent = config.profile.letter || 'M';
  }

  // Profile
  document.getElementById('profileName').textContent = config.profile.name;
  document.getElementById('profileBio').textContent = config.profile.bio;
  document.title = `${config.profile.name} — Links`;

  // Footer
  document.getElementById('footer').innerHTML = `&copy; ${new Date().getFullYear()} ${config.profile.name}`;

  // Socials
  const socialsEl = document.getElementById('socials');
  socialsEl.innerHTML = '';
  config.socials.forEach(s => {
    if (!s.url) return;
    const a = document.createElement('a');
    // For email icon, auto-prefix mailto:
    const href = s.icon === 'email' && !s.url.startsWith('mailto:') ? `mailto:${s.url}` : s.url;
    a.href = href;
    a.setAttribute('aria-label', s.label || s.icon);
    if (!href.startsWith('mailto:')) { a.target = '_blank'; a.rel = 'noopener'; }
    a.innerHTML = SOCIAL_SVGS[s.icon] || SOCIAL_SVGS.website;
    socialsEl.appendChild(a);
  });

  // Links
  const linksEl = document.getElementById('links');
  linksEl.innerHTML = '';
  config.links.forEach(link => {
    const a = document.createElement('a');
    a.className = 'link-card';
    a.href = link.url || '#';
    if (!link.url?.startsWith('mailto:')) { a.target = '_blank'; a.rel = 'noopener'; }
    a.innerHTML = `
      <div class="link-icon" style="background:${iconBg(link.color)};color:${link.color}">
        ${ICONS[link.icon] || ICONS.link}
      </div>
      <div class="link-info">
        <div class="title">${escHtml(link.title)}</div>
        <div class="desc">${escHtml(link.desc)}</div>
      </div>
      <div class="link-arrow">${ARROW_SVG}</div>
    `;
    linksEl.appendChild(a);
  });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderEditor() {
  const body = document.getElementById('editorBody');
  body.innerHTML = '';

  // ── Profile Section ──
  const profileSec = sec('Profile');

  // Avatar image upload
  const avatarArea = document.createElement('div');
  avatarArea.className = 'avatar-upload-area';

  const avatarPreview = document.createElement('div');
  avatarPreview.className = 'avatar-preview';
  if (config.profile.image) {
    avatarPreview.innerHTML = `<img src="${config.profile.image}" alt="Preview">`;
  } else {
    avatarPreview.textContent = config.profile.letter || 'M';
  }
  avatarArea.appendChild(avatarPreview);

  const avatarBtns = document.createElement('div');
  avatarBtns.className = 'avatar-upload-btns';

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*';
  fileInput.className = 'avatar-file-input';
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      // Resize to keep localStorage manageable
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const size = 256;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        // Center-crop
        const min = Math.min(img.width, img.height);
        const sx = (img.width - min) / 2;
        const sy = (img.height - min) / 2;
        ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
        config.profile.image = canvas.toDataURL('image/jpeg', 0.85);
        save();
        renderEditor();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  avatarBtns.appendChild(fileInput);

  const uploadBtn = document.createElement('button');
  uploadBtn.type = 'button';
  uploadBtn.className = 'avatar-upload-btn';
  uploadBtn.textContent = config.profile.image ? 'Change Photo' : 'Upload Photo';
  uploadBtn.onclick = () => fileInput.click();
  avatarBtns.appendChild(uploadBtn);

  if (config.profile.image) {
    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'avatar-remove-btn';
    removeBtn.textContent = 'Remove';
    removeBtn.onclick = () => {
      config.profile.image = '';
      save();
      renderEditor();
    };
    avatarBtns.appendChild(removeBtn);
  }

  avatarArea.appendChild(avatarBtns);
  profileSec.appendChild(avatarArea);

  profileSec.appendChild(field('Avatar Letter', 'text', config.profile.letter, v => {
    config.profile.letter = v.slice(0,2);
    save();
  }, 1));
  profileSec.appendChild(field('Display Name', 'text', config.profile.name, v => {
    config.profile.name = v;
    save();
  }));
  profileSec.appendChild(textareaField('Bio', config.profile.bio, v => {
    config.profile.bio = v;
    save();
  }));
  body.appendChild(profileSec);

  // ── Social Links Section ──
  const socialSec = sec('Social Links');
  config.socials.forEach((social, i) => {
    socialSec.appendChild(renderSocialEditor(social, i));
  });

  const addSocialBtn = document.createElement('button');
  addSocialBtn.className = 'add-link-btn';
  addSocialBtn.textContent = '+ Add Social Link';
  addSocialBtn.onclick = () => {
    config.socials.push({ icon: 'website', label: 'Website', url: '' });
    save();
    renderEditor();
  };
  socialSec.appendChild(addSocialBtn);
  body.appendChild(socialSec);

  // ── Link Cards Section ──
  const linksSec = sec('Link Cards');
  config.links.forEach((link, i) => {
    linksSec.appendChild(renderLinkEditor(link, i));
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-link-btn';
  addBtn.textContent = '+ Add New Link';
  addBtn.onclick = () => {
    config.links.push({ title: 'New Link', desc: 'Description here', url: '#', icon: 'link', color: '#6366f1' });
    save();
    renderEditor();
  };
  linksSec.appendChild(addBtn);
  body.appendChild(linksSec);

  // ── Theme Section ──
  const themeSec = sec('Accent Color');
  const swatches = document.createElement('div');
  swatches.className = 'color-swatches';
  ACCENT_COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (config.theme.accent === c.value ? ' active' : '');
    s.style.background = c.value;
    s.title = c.name;
    s.onclick = () => {
      config.theme.accent = c.value;
      save();
      renderEditor();
    };
    swatches.appendChild(s);
  });
  themeSec.appendChild(swatches);
  body.appendChild(themeSec);

  // ── Export Section ──
  const exportSec = sec('Deploy');
  const exportBtn = document.createElement('button');
  exportBtn.className = 'export-btn';
  exportBtn.textContent = 'Download Site';
  exportBtn.onclick = exportSite;
  exportSec.appendChild(exportBtn);
  const exportDesc = document.createElement('p');
  exportDesc.className = 'export-desc';
  exportDesc.textContent = 'Downloads your page with all edits baked in. Upload to GitHub to update the live site.';
  exportSec.appendChild(exportDesc);
  body.appendChild(exportSec);
}

  delBtn.className = 'delete-btn';

  delBtn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>';
  delBtn.onclick = () => { config.socials.splice(index, 1); save(); renderEditor(); };
  actions.appendChild(delBtn);
  header.appendChild(actions);
  item.appendChild(header);

  // label field
  item.appendChild(field('Label', 'text', social.label, v => { social.label = v; save(); }));
  // url field
  item.appendChild(field('URL / Handle', 'text', social.url, v => { social.url = v; save(); }));

  // icon picker
  const iconField = document.createElement('div');
  iconField.className = 'editor-field';
  iconField.innerHTML = '<label>Icon</label>';
  const picker = document.createElement('div');
  picker.className = 'icon-picker';
  SOCIAL_KEYS.forEach(key => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = social.icon === key ? 'active' : '';
    btn.innerHTML = SOCIAL_SVGS[key];
    btn.title = key;
    btn.style.cssText = 'color: var(--text-muted)';
    btn.querySelector('svg').style.cssText = 'width:16px;height:16px;fill:currentColor';
    btn.onclick = () => { social.icon = key; save(); renderEditor(); };
    picker.appendChild(btn);
  });
  iconField.appendChild(picker);
  item.appendChild(iconField);

  return item;
}

function renderLinkEditor(link, index) {
  const item = document.createElement('div');
  item.className = 'editor-link-item';

  // header with reorder + delete
  const header = document.createElement('div');
  header.className = 'link-item-header';
  header.innerHTML = `<span>Link ${index + 1}</span>`;

  const actions = document.createElement('div');
  actions.className = 'link-item-actions';

  // move up
  if (index > 0) {
    const upBtn = document.createElement('button');
    upBtn.title = 'Move up';
    upBtn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg>';
    upBtn.onclick = () => { [config.links[index-1], config.links[index]] = [config.links[index], config.links[index-1]]; save(); renderEditor(); };
    actions.appendChild(upBtn);
  }
  // move down
  if (index < config.links.length - 1) {
    const downBtn = document.createElement('button');
    downBtn.title = 'Move down';
    downBtn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>';
    downBtn.onclick = () => { [config.links[index], config.links[index+1]] = [config.links[index+1], config.links[index]]; save(); renderEditor(); };
    actions.appendChild(downBtn);
  }
  // delete
  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.title = 'Delete';
  delBtn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>';
  delBtn.onclick = () => { config.links.splice(index, 1); save(); renderEditor(); };
  actions.appendChild(delBtn);

  header.appendChild(actions);
  item.appendChild(header);

  // fields
  item.appendChild(field('Title', 'text', link.title, v => { link.title = v; save(); }));
  item.appendChild(field('Description', 'text', link.desc, v => { link.desc = v; save(); }));
  item.appendChild(field('URL', 'url', link.url, v => { link.url = v; save(); }));

  // icon picker
  const iconField = document.createElement('div');
  iconField.className = 'editor-field';
  iconField.innerHTML = '<label>Icon</label>';
  const picker = document.createElement('div');
  picker.className = 'icon-picker';
  ICON_KEYS.forEach(key => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = link.icon === key ? 'active' : '';
    btn.innerHTML = ICONS[key];
    btn.title = key;
    btn.onclick = () => { link.icon = key; save(); renderEditor(); };
    picker.appendChild(btn);
  });
  iconField.appendChild(picker);
  item.appendChild(iconField);

  // color picker
  const colorField = document.createElement('div');
  colorField.className = 'editor-field';
  colorField.innerHTML = '<label>Color</label>';
  const colorPicker = document.createElement('div');
  colorPicker.className = 'link-color-swatches';
  LINK_COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'link-color-swatch' + (link.color === c ? ' active' : '');
    s.style.background = c;
    s.onclick = () => { link.color = c; save(); renderEditor(); };
    colorPicker.appendChild(s);
  });
  colorField.appendChild(colorPicker);
  item.appendChild(colorField);

  return item;
}

// ── Helpers ──
function sec(title) {
  const s = document.createElement('div');
  s.className = 'editor-section';
  s.innerHTML = `<h3>${title}</h3>`;
  return s;
}

function field(label, type, value, onChange, maxLen) {
  const f = document.createElement('div');
  f.className = 'editor-field';
  const l = document.createElement('label');
  l.textContent = label;
  const inp = document.createElement('input');
  inp.type = type;
  inp.value = value || '';
  if (maxLen) inp.maxLength = maxLen;
  inp.addEventListener('input', () => onChange(inp.value));
  f.appendChild(l);
  f.appendChild(inp);
  return f;
}

function textareaField(label, value, onChange) {
  const f = document.createElement('div');
  f.className = 'editor-field';
  const l = document.createElement('label');
  l.textContent = label;
  const ta = document.createElement('textarea');
  ta.value = value || '';
  ta.rows = 3;
  ta.addEventListener('input', () => onChange(ta.value));
  f.appendChild(l);
  f.appendChild(ta);
  return f;
}

function save() {
  saveConfig();
  renderPage();
}

// ═══════════════════════════════════════════
// EDITOR TOGGLE
// ═══════════════════════════════════════════
// PIN AUTH + EDITOR TOGGLE
// ═══════════════════════════════════════════
const PIN_HASH = '5736'; // Editor PIN
let isAuthenticated = false;

const fab = document.getElementById('editFab');
const panel = document.getElementById('editorPanel');
const overlay = document.getElementById('editorOverlay');
const closeBtn = document.getElementById('editorClose');
const pinModal = document.getElementById('pinModal');
const pinInput = document.getElementById('pinInput');
const pinSubmit = document.getElementById('pinSubmit');
const pinCancel = document.getElementById('pinCancel');
const avatarEl_click = document.getElementById('avatar');

// Secret trigger: triple-click the avatar to open PIN modal
let clickCount = 0;
let clickTimer = null;
avatarEl_click.addEventListener('click', () => {
  if (isAuthenticated) return; // already unlocked
  clickCount++;
  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => { clickCount = 0; }, 600);
  if (clickCount >= 3) {
    clickCount = 0;
    showPinModal();
  }
});

function showPinModal() {
  pinModal.classList.add('open');
  pinInput.value = '';
  pinInput.classList.remove('error');
  setTimeout(() => pinInput.focus(), 100);
}

function hidePinModal() {
  pinModal.classList.remove('open');
  pinInput.value = '';
}

function authenticate() {
  if (pinInput.value === PIN_HASH) {
    isAuthenticated = true;
    sessionStorage.setItem('linkme_auth', '1');
    hidePinModal();
    fab.classList.add('visible');
  } else {
    pinInput.classList.add('error');
    setTimeout(() => pinInput.classList.remove('error'), 500);
    pinInput.value = '';
    pinInput.focus();
  }
}

pinSubmit.addEventListener('click', authenticate);
pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') authenticate(); });
pinCancel.addEventListener('click', hidePinModal);
document.addEventListener('keydown', e => { if (e.key === 'Escape') { hidePinModal(); closeEditor(); } });

function openEditor() {
  panel.classList.add('open');
  overlay.classList.add('open');
  renderEditor();
}
function closeEditor() {
  panel.classList.remove('open');
  overlay.classList.remove('open');
}

fab.addEventListener('click', openEditor);
overlay.addEventListener('click', closeEditor);
closeBtn.addEventListener('click', closeEditor);

// ═══════════════════════════════════════════
// EXPORT SITE — bakes current config into a downloadable HTML
// ═══════════════════════════════════════════
function exportSite() {
  // Clone current page HTML
  const clone = document.documentElement.cloneNode(true);

  // Remove editor UI elements from the clone
  const removeSelectors = [
    '.edit-fab', '.editor-overlay', '.editor-panel', '.pin-modal'
  ];
  removeSelectors.forEach(sel => {
    const el = clone.querySelector(sel);
    if (el) el.remove();
  });

  // Update the default config in the script to match current config
  const scripts = clone.querySelectorAll('script');
  scripts.forEach(script => {
    if (script.textContent.includes('DEFAULT_CONFIG')) {
      // Replace the DEFAULT_CONFIG with current config values
      script.textContent = script.textContent.replace(
        /const DEFAULT_CONFIG = \{[\s\S]*?\n\};/,
        'const DEFAULT_CONFIG = ' + JSON.stringify(config, null, 2) + ';'
      );
    }
  });

  const html = '<!DOCTYPE html>\n' + clone.outerHTML;
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

loadConfig();
renderPage();

// Restore auth from session (so refresh doesn't log you out)
if (sessionStorage.getItem('linkme_auth') === '1') {
  isAuthenticated = true;
  fab.classList.add('visible');
}

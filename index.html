<!DOCTYPE html>
<html lang="en" style="--accent: #6366f1; --accent-glow: rgba(99,102,241,0.25);"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@mikebdetro / @return3 — Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --card-hover: #1a1a1a;
      --border: #222;
      --border-hover: #333;
      --text: #f5f5f5;
      --text-muted: #888;
      --accent: #6366f1;
      --accent-glow: rgba(99,102,241,.25);
      --radius: 16px;
    }

    html { scroll-behavior: smooth }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.25rem 4rem;
      overflow-x: hidden;
    }

    /* ── animated gradient blob ── */
    .blob {
      position: fixed;
      top: -120px;
      width: 420px; height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      animation: pulse 6s ease-in-out infinite alternate;
    }
    @keyframes pulse { to { opacity: .5; transform: scale(1.15) } }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
    }

    /* ── avatar ── */
    .avatar {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      display: grid;
      place-items: center;
      font-size: 2.25rem;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 0 3px var(--bg), 0 0 0 5px var(--accent);
      user-select: none;
      overflow: hidden;
    }
    .avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile { text-align: center }
    .profile h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -.02em }
    .profile p {
      margin-top: .35rem;
      font-size: .9rem;
      color: var(--text-muted);
      max-width: 320px;
      line-height: 1.5;
    }

    /* ── socials row ── */
    .socials { display: flex; gap: .75rem }
    .socials a {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      display: grid;
      place-items: center;
      color: var(--text-muted);
      text-decoration: none;
      transition: all .2s;
    }
    .socials a:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--accent-glow);
    }
    .socials svg { width: 18px; height: 18px; fill: currentColor }

    /* ── link cards ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      transition: all .25s cubic-bezier(.4,0,.2,1);
      position: relative;
      overflow: hidden;
    }
    .link-card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 60%);
      opacity: 0;
      transition: opacity .25s;
    }
    .link-card:hover {
      border-color: var(--border-hover);
      background: var(--card-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
    }
    .link-card:hover::before { opacity: 1 }

    .link-icon {
      position: relative;
      width: 42px; height: 42px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-size: 1.2rem;
    }

    .link-info { position: relative; flex: 1; min-width: 0 }
    .link-info .title { font-weight: 600; font-size: .95rem }
    .link-info .desc {
      font-size: .8rem;
      color: var(--text-muted);
      margin-top: .15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      position: relative;
      color: var(--text-muted);
      transition: transform .2s, color .2s;
    }
    .link-card:hover .link-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    footer {
      margin-top: 3rem;
      font-size: .75rem;
      color: var(--text-muted);
      text-align: center;
      opacity: .6;
    }

    /* ── entrance animations ── */
    .container > * { animation: fadeUp .5s ease both }
    .container > *:nth-child(1) { animation-delay: .05s }
    .container > *:nth-child(2) { animation-delay: .1s }
    .container > *:nth-child(3) { animation-delay: .15s }
    .container > *:nth-child(4) { animation-delay: .2s }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px) }
      to   { opacity: 1; transform: translateY(0) }
    }

    @media (max-width: 480px) {
      body { padding: 2rem 1rem 3rem }
      .avatar { width: 80px; height: 80px; font-size: 1.85rem }
      .profile h1 { font-size: 1.3rem }
    }

    /* ═══════════════════════════════════════════
       EDITOR PANEL STYLES
       ═══════════════════════════════════════════ */

    /* floating edit button — hidden until authenticated */
    .edit-fab {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #fff;
      display: none;
      place-items: center;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 4px 20px var(--accent-glow);
      transition: transform .2s, box-shadow .2s;
    }
    .edit-fab.visible { display: grid }
    .edit-fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px var(--accent-glow) }
    .edit-fab svg { width: 22px; height: 22px }

    /* overlay */
    .editor-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 1001;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s;
    }
    .editor-overlay.open { opacity: 1; pointer-events: auto }

    /* panel */
    .editor-panel {
      position: fixed;
      top: 0; right: 0;
      width: 380px;
      height: 100%;
      background: #111;
      border-left: 1px solid var(--border);
      z-index: 1002;
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .editor-panel.open { transform: translateX(0) }

    @media (max-width: 480px) {
      .editor-panel { width: 100% }
    }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .editor-header h2 { font-size: 1.1rem; font-weight: 700 }
    .editor-close {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all .15s;
    }
    .editor-close:hover { background: var(--card); color: var(--text) }

    .editor-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
    }

    .editor-section h3 {
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      margin-bottom: .75rem;
    }

    .editor-field { margin-bottom: .75rem }
    .editor-field label {
      display: block;
      font-size: .8rem;
      color: var(--text-muted);
      margin-bottom: .3rem;
    }
    .editor-field input,
    .editor-field textarea {
      width: 100%;
      padding: .6rem .75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: .85rem;
      outline: none;
      transition: border-color .15s;
    }
    .editor-field input:focus,
    .editor-field textarea:focus {
      border-color: var(--accent);
    }
    .editor-field textarea { resize: vertical; min-height: 60px }

    /* accent color swatches */
    .color-swatches {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .color-swatch {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform .15s, border-color .15s;
    }
    .color-swatch:hover { transform: scale(1.15) }
    .color-swatch.active { border-color: #fff; transform: scale(1.15) }

    /* link card editor items */
    .editor-link-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: .75rem;
      position: relative;
    }
    .editor-link-item .editor-field { margin-bottom: .6rem }
    .editor-link-item .editor-field:last-child { margin-bottom: 0 }

    .link-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .75rem;
    }
    .link-item-header span {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text);
    }
    .link-item-actions { display: flex; gap: .35rem }
    .link-item-actions button {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all .15s;
    }
    .link-item-actions button:hover { background: var(--card); color: var(--text) }
    .link-item-actions button.delete-btn:hover { color: #ef4444; border-color: #ef4444 }

    /* icon picker */
    .icon-picker {
      display: flex;
      gap: .4rem;
      flex-wrap: wrap;
    }
    .icon-picker button {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: all .15s;
    }
    .icon-picker button:hover { color: var(--text); border-color: var(--border-hover) }
    .icon-picker button.active { border-color: var(--accent); color: var(--accent) }
    .icon-picker button svg { width: 16px; height: 16px }

    /* link color mini swatches */
    .link-color-swatches {
      display: flex;
      gap: .35rem;
      flex-wrap: wrap;
    }
    .link-color-swatch {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform .15s, border-color .15s;
    }
    .link-color-swatch:hover { transform: scale(1.15) }
    .link-color-swatch.active { border-color: #fff }

    /* avatar upload in editor */
    .avatar-upload-area {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: .75rem;
    }
    .avatar-preview {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      display: grid;
      place-items: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
      overflow: hidden;
    }
    .avatar-preview img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .avatar-upload-btns {
      display: flex;
      flex-direction: column;
      gap: .4rem;
    }
    .avatar-upload-btn,
    .avatar-remove-btn {
      padding: .45rem .85rem;
      border-radius: 8px;
      font-family: inherit;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      border: 1px solid var(--border);
    }
    .avatar-upload-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .avatar-upload-btn:hover { opacity: .85 }
    .avatar-remove-btn {
      background: transparent;
      color: var(--text-muted);
    }
    .avatar-remove-btn:hover { color: #ef4444; border-color: #ef4444 }
    .avatar-file-input { display: none }

    /* PIN modal */
    .pin-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 2000;
      display: none;
      place-items: center;
    }
    .pin-modal.open { display: grid }
    .pin-box {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      width: 320px;
      text-align: center;
    }
    .pin-box h3 { font-size: 1.1rem; margin-bottom: .35rem }
    .pin-box p { font-size: .8rem; color: var(--text-muted); margin-bottom: 1.25rem }
    .pin-input {
      width: 100%;
      padding: .7rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 1.2rem;
      text-align: center;
      letter-spacing: .5em;
      outline: none;
      transition: border-color .15s;
    }
    .pin-input:focus { border-color: var(--accent) }
    .pin-input.error { border-color: #ef4444; animation: shake .4s }
    @keyframes shake {
      0%,100% { transform: translateX(0) }
      25% { transform: translateX(-6px) }
      75% { transform: translateX(6px) }
    }
    .pin-submit {
      margin-top: 1rem;
      width: 100%;
      padding: .7rem;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .pin-submit:hover { opacity: .85 }
    .pin-cancel {
      margin-top: .6rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: .8rem;
      cursor: pointer;
    }
    .pin-cancel:hover { color: var(--text) }

    /* export button in editor */
    .export-btn {
      width: 100%;
      padding: .75rem;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .export-btn:hover { opacity: .85 }
    .export-desc {
      font-size: .75rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: .4rem;
      line-height: 1.4;
    }

    .upload-btn {
      width: 100%;
      padding: .75rem;
      background: transparent;
      border: 2px solid var(--accent);
      border-radius: 12px;
      color: var(--accent);
      font-family: inherit;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      margin-top: .5rem;
    }
    .upload-btn:hover { background: var(--accent); color: #fff }

    .deploy-status {
      font-size: .8rem;
      text-align: center;
      margin-top: .5rem;
      padding: .5rem;
      border-radius: 8px;
      display: none;
    }
    .deploy-status.show { display: block }
    .deploy-status.success { background: rgba(34,197,94,.15); color: #22c55e }
    .deploy-status.error { background: rgba(239,68,68,.15); color: #ef4444 }
    .deploy-status.loading { background: rgba(99,102,241,.15); color: var(--accent) }

    .token-setup {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      margin-top: .5rem;
    }
    .token-setup p {
      font-size: .75rem;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: .6rem;
    }
    .token-setup a {
      color: var(--accent);
      text-decoration: none;
    }
    .token-setup a:hover { text-decoration: underline }
    .token-row {
      display: flex;
      gap: .4rem;
    }
    .token-row input {
      flex: 1;
      padding: .5rem .6rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: .78rem;
      outline: none;
    }
    .token-row input:focus { border-color: var(--accent) }
    .token-row button {
      padding: .5rem .75rem;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: inherit;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
    }
    .token-saved {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .78rem;
      color: #22c55e;
    }
    .token-saved button {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: .75rem;
      cursor: pointer;
      text-decoration: underline;
    }
    .token-saved button:hover { color: #ef4444 }

    .add-link-btn {
      width: 100%;
      padding: .75rem;
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: 12px;
      color: var(--text-muted);
      font-family: inherit;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .add-link-btn:hover { border-color: var(--accent); color: var(--accent) }
  </style>
</head>

// STATE
// ═══════════════════════════════════════════
let config;

function loadConfig() {
  try {
    const saved = localStorage.getItem('linkme_config');
    if (saved) {
      config = JSON.parse(saved);
      // ensure all keys exist (migration-safe)
      config.profile = { ...DEFAULT_CONFIG.profile, ...config.profile };
      config.theme   = { ...DEFAULT_CONFIG.theme, ...config.theme };
      if (!Array.isArray(config.links)) config.links = DEFAULT_CONFIG.links;
      // migrate old object-style socials to array
      if (!Array.isArray(config.socials)) {
        const old = config.socials || {};
        config.socials = [];
        if (old.github)   config.socials.push({ icon: 'github',   label: 'GitHub',     url: old.github });
        if (old.twitter)  config.socials.push({ icon: 'twitter',  label: 'X / Twitter', url: old.twitter });
        if (old.linkedin) config.socials.push({ icon: 'linkedin', label: 'LinkedIn',    url: old.linkedin });
        if (old.email)    config.socials.push({ icon: 'email',    label: 'Email',       url: old.email });
      }
    } else {
      config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    }
  } catch {
    config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  }
}

function saveConfig() {
  localStorage.setItem('linkme_config', JSON.stringify(config));
}

// ═══════════════════════════════════════════
// RENDER PAGE
// ═══════════════════════════════════════════
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function iconBg(color) {
  const r = parseInt(color.slice(1,3),16);
  const g = parseInt(color.slice(3,5),16);
  const b = parseInt(color.slice(5,7),16);
  return `rgba(${r},${g},${b},.15)`;
}

function applyTheme() {
  const accent = config.theme.accent;
  document.documentElement.style.setProperty('--accent', accent);
  document.documentElement.style.setProperty('--accent-glow', hexToRgba(accent, .25));
}

function renderPage() {
  applyTheme();

  // Avatar
  const avatarEl = document.getElementById('avatar');
  if (config.profile.image) {
    avatarEl.innerHTML = `<img src="${config.profile.image}" alt="Profile">`;
  } else {
    avatarEl.textContent = config.profile.letter || 'M';
  }

  // Profile
  document.getElementById('profileName').textContent = config.profile.name;
  document.getElementById('profileBio').textContent = config.profile.bio;
  document.title = `${config.profile.name} — Links`;

  // Footer
  document.getElementById('footer').innerHTML = `&copy; ${new Date().getFullYear()} ${config.profile.name}`;

  // Socials
  const socialsEl = document.getElementById('socials');
  socialsEl.innerHTML = '';
  config.socials.forEach(s => {
    if (!s.url) return;
    const a = document.createElement('a');
    // For email icon, auto-prefix mailto:; for everything else, ensure https://
    const href = s.icon === 'email' && !s.url.startsWith('mailto:') ? `mailto:${s.url}` : fixUrl(s.url);
    a.href = href;
    a.setAttribute('aria-label', s.label || s.icon);
    if (!href.startsWith('mailto:')) { a.target = '_blank'; a.rel = 'noopener'; }
    a.innerHTML = SOCIAL_SVGS[s.icon] || SOCIAL_SVGS.website;
    socialsEl.appendChild(a);
  });

  // Links
  const linksEl = document.getElementById('links');
  linksEl.innerHTML = '';
  config.links.forEach(link => {
    const a = document.createElement('a');
    a.className = 'link-card';
    a.href = fixUrl(link.url) || '#';
    if (!link.url?.startsWith('mailto:')) { a.target = '_blank'; a.rel = 'noopener'; }
    a.innerHTML = `
      <div class="link-icon" style="background:${iconBg(link.color)};color:${link.color}">
        ${ICONS[link.icon] || ICONS.link}
      </div>
      <div class="link-info">
        <div class="title">${escHtml(link.title)}</div>
        <div class="desc">${escHtml(link.desc)}</div>
      </div>
      <div class="link-arrow">${ARROW_SVG}</div>
    `;
    linksEl.appendChild(a);
  });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fixUrl(url) {
  if (!url || url === '#') return url;
  if (/^(https?:\/\/|mailto:|tel:)/.test(url)) return url;
  return 'https://' + url;
}

// ═══════════════════════════════════════════
// RENDER EDITOR
// ═══════════════════════════════════════════
function renderEditor() {
  const body = document.getElementById('editorBody');
  body.innerHTML = '';

  // ── Profile Section ──
  const profileSec = sec('Profile');

  // Avatar image upload
  const avatarArea = document.createElement('div');
  avatarArea.className = 'avatar-upload-area';

  const avatarPreview = document.createElement('div');
  avatarPreview.className = 'avatar-preview';
  if (config.profile.image) {
    avatarPreview.innerHTML = `<img src="${config.profile.image}" alt="Preview">`;
  } else {
    avatarPreview.textContent = config.profile.letter || 'M';
  }
  avatarArea.appendChild(avatarPreview);

  const avatarBtns = document.createElement('div');
  avatarBtns.className = 'avatar-upload-btns';

  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*';
  fileInput.className = 'avatar-file-input';
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      // Resize to keep localStorage manageable
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const size = 256;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        // Center-crop
        const min = Math.min(img.width, img.height);
        const sx = (img.width - min) / 2;
        const sy = (img.height - min) / 2;
        ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
        config.profile.image = canvas.toDataURL('image/jpeg', 0.85);
        save();
        renderEditor();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  avatarBtns.appendChild(fileInput);

  const uploadBtn = document.createElement('button');
  uploadBtn.type = 'button';
  uploadBtn.className = 'avatar-upload-btn';
  uploadBtn.textContent = config.profile.image ? 'Change Photo' : 'Upload Photo';
  uploadBtn.onclick = () => fileInput.click();
  avatarBtns.appendChild(uploadBtn);

  if (config.profile.image) {
    const removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'avatar-remove-btn';
    removeBtn.textContent = 'Remove';
    removeBtn.onclick = () => {
      config.profile.image = '';
      save();
      renderEditor();
    };
    avatarBtns.appendChild(removeBtn);
  }

  avatarArea.appendChild(avatarBtns);
  profileSec.appendChild(avatarArea);

  profileSec.appendChild(field('Avatar Letter', 'text', config.profile.letter, v => {
    config.profile.letter = v.slice(0,2);
    save();
  }, 1));
  profileSec.appendChild(field('Display Name', 'text', config.profile.name, v => {
    config.profile.name = v;
    save();
  }));
  profileSec.appendChild(textareaField('Bio', config.profile.bio, v => {
    config.profile.bio = v;
    save();
  }));
  body.appendChild(profileSec);

  // ── Social Links Section ──
  const socialSec = sec('Social Links');
  config.socials.forEach((social, i) => {
    socialSec.appendChild(renderSocialEditor(social, i));
  });

  const addSocialBtn = document.createElement('button');
  addSocialBtn.className = 'add-link-btn';
  addSocialBtn.textContent = '+ Add Social Link';
  addSocialBtn.onclick = () => {
    config.socials.push({ icon: 'website', label: 'Website', url: '' });
    save();
    renderEditor();
  };
  socialSec.appendChild(addSocialBtn);
  body.appendChild(socialSec);

  // ── Link Cards Section ──
  const linksSec = sec('Link Cards');
  config.links.forEach((link, i) => {
    linksSec.appendChild(renderLinkEditor(link, i));
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-link-btn';
  addBtn.textContent = '+ Add New Link';
  addBtn.onclick = () => {
    config.links.push({ title: 'New Link', desc: 'Description here', url: '#', icon: 'link', color: '#6366f1' });
    save();
    renderEditor();
  };
  linksSec.appendChild(addBtn);
  body.appendChild(linksSec);

  // ── Theme Section ──
  const themeSec = sec('Accent Color');
  const swatches = document.createElement('div');
  swatches.className = 'color-swatches';
  ACCENT_COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (config.theme.accent === c.value ? ' active' : '');
    s.style.background = c.value;
    s.title = c.name;
    s.onclick = () => {
      config.theme.accent = c.value;
      save();
      renderEditor();
    };
    swatches.appendChild(s);
  });
  themeSec.appendChild(swatches);
  body.appendChild(themeSec);

  // ── Deploy Section ──
  const deploySec = sec('Deploy');

  // Download button
  const exportBtn = document.createElement('button');
  exportBtn.className = 'export-btn';
  exportBtn.textContent = 'Download Site';
  exportBtn.onclick = exportSite;
  deploySec.appendChild(exportBtn);

  // Upload & Deploy button
  const uploadBtn = document.createElement('button');
  uploadBtn.className = 'upload-btn';
  uploadBtn.textContent = 'Upload & Deploy';
  const uploadInput = document.createElement('input');
  uploadInput.type = 'file';
  uploadInput.accept = '.html';
  uploadInput.style.display = 'none';
  uploadBtn.onclick = () => {
    const token = localStorage.getItem('linkme_gh_token');
    if (!token) {
      showDeployStatus('Set up your GitHub token below first', 'error');
      return;
    }
    uploadInput.click();
  };
  uploadInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      deployToGitHub(ev.target.result);
    };
    reader.readAsText(file);
    uploadInput.value = '';
  });
  deploySec.appendChild(uploadBtn);
  deploySec.appendChild(uploadInput);

  // Status message
  const statusEl = document.createElement('div');
  statusEl.className = 'deploy-status';
  statusEl.id = 'deployStatus';
  deploySec.appendChild(statusEl);

  const deployDesc = document.createElement('p');
  deployDesc.className = 'export-desc';
  deployDesc.textContent = 'Download to save your edits as a file. Upload to push it live to mikebdetro.com.';
  deploySec.appendChild(deployDesc);

  // GitHub token setup
  const tokenBox = document.createElement('div');
  tokenBox.className = 'token-setup';
  const savedToken = localStorage.getItem('linkme_gh_token');

  if (savedToken) {
    tokenBox.innerHTML = '<div class="token-saved"><span>GitHub token saved</span><button id="removeToken">Remove</button></div>';
    deploySec.appendChild(tokenBox);
    setTimeout(() => {
      const rmBtn = document.getElementById('removeToken');
      if (rmBtn) rmBtn.onclick = () => { localStorage.removeItem('linkme_gh_token'); renderEditor(); };
    }, 0);
  } else {
    tokenBox.innerHTML = `
      <p><strong>One-time setup:</strong> Create a GitHub token to enable direct deploys.<br>
      Go to <a href="https://github.com/settings/tokens/new" target="_blank">github.com/settings/tokens</a> → Generate → check <strong>"repo"</strong> scope → copy the token and paste below.</p>
      <div class="token-row">
        <input type="password" id="ghTokenInput" placeholder="ghp_xxxxxxxxxxxx" />
        <button id="saveToken">Save</button>
      </div>
    `;
    deploySec.appendChild(tokenBox);
    setTimeout(() => {
      const saveBtn = document.getElementById('saveToken');
      const tokenInp = document.getElementById('ghTokenInput');
      if (saveBtn) saveBtn.onclick = () => {
        const val = tokenInp.value.trim();
        if (val) {
          localStorage.setItem('linkme_gh_token', val);
          renderEditor();
          showDeployStatus('Token saved! You can now Upload & Deploy.', 'success');
        }
      };
    }, 0);
  }

  body.appendChild(deploySec);
}

function renderSocialEditor(social, index) {
  const item = document.createElement('div');
  item.className = 'editor-link-item';

  // header
  const header = document.createElement('div');
  header.className = 'link-item-header';
  header.innerHTML = `<span>${escHtml(social.label || 'Social ' + (index + 1))}</span>`;

  const actions = document.createElement('div');
  actions.className = 'link-item-actions';

  // delete
  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.title = 'Delete';
  delBtn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>';
  delBtn.onclick = () => { config.socials.splice(index, 1); save(); renderEditor(); };
  actions.appendChild(delBtn);
  header.appendChild(actions);
  item.appendChild(header);

  // label field
  item.appendChild(field('Label', 'text', social.label, v => { social.label = v; save(); }));
  // url field
  item.appendChild(field('URL / Handle', 'text', social.url, v => { social.url = v; save(); }));

  // icon picker
  const iconField = document.createElement('div');
  iconField.className = 'editor-field';
  iconField.innerHTML = '<label>Icon</label>';
  const picker = document.createElement('div');
  picker.className = 'icon-picker';
  SOCIAL_KEYS.forEach(key => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = social.icon === key ? 'active' : '';
    btn.innerHTML = SOCIAL_SVGS[key];
    btn.title = key;
    btn.style.cssText = 'color: var(--text-muted)';
    btn.querySelector('svg').style.cssText = 'width:16px;height:16px;fill:currentColor';
    btn.onclick = () => { social.icon = key; save(); renderEditor(); };
    picker.appendChild(btn);
  });
  iconField.appendChild(picker);
  item.appendChild(iconField);

  return item;
}

function renderLinkEditor(link, index) {
  const item = document.createElement('div');
  item.className = 'editor-link-item';

  // header with reorder + delete
  const header = document.createElement('div');
  header.className = 'link-item-header';
  header.innerHTML = `<span>Link ${index + 1}</span>`;

  const actions = document.createElement('div');
  actions.className = 'link-item-actions';

  // move up
  if (index > 0) {
    const upBtn = document.createElement('button');
    upBtn.title = 'Move up';
    upBtn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg>';
    upBtn.onclick = () => { [config.links[index-1], config.links[index]] = [config.links[index], config.links[index-1]]; save(); renderEditor(); };
    actions.appendChild(upBtn);
  }
  // move down
  if (index < config.links.length - 1) {
    const downBtn = document.createElement('button');
    downBtn.title = 'Move down';
    downBtn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>';
    downBtn.onclick = () => { [config.links[index], config.links[index+1]] = [config.links[index+1], config.links[index]]; save(); renderEditor(); };
    actions.appendChild(downBtn);
  }
  // delete
  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.title = 'Delete';
  delBtn.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>';
  delBtn.onclick = () => { config.links.splice(index, 1); save(); renderEditor(); };
  actions.appendChild(delBtn);

  header.appendChild(actions);
  item.appendChild(header);

  // fields
  item.appendChild(field('Title', 'text', link.title, v => { link.title = v; save(); }));
  item.appendChild(field('Description', 'text', link.desc, v => { link.desc = v; save(); }));
  item.appendChild(field('URL', 'url', link.url, v => { link.url = v; save(); }));

  // icon picker
  const iconField = document.createElement('div');
  iconField.className = 'editor-field';
  iconField.innerHTML = '<label>Icon</label>';
  const picker = document.createElement('div');
  picker.className = 'icon-picker';
  ICON_KEYS.forEach(key => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = link.icon === key ? 'active' : '';
    btn.innerHTML = ICONS[key];
    btn.title = key;
    btn.onclick = () => { link.icon = key; save(); renderEditor(); };
    picker.appendChild(btn);
  });
  iconField.appendChild(picker);
  item.appendChild(iconField);

  // color picker
  const colorField = document.createElement('div');
  colorField.className = 'editor-field';
  colorField.innerHTML = '<label>Color</label>';
  const colorPicker = document.createElement('div');
  colorPicker.className = 'link-color-swatches';
  LINK_COLORS.forEach(c => {
    const s = document.createElement('div');
    s.className = 'link-color-swatch' + (link.color === c ? ' active' : '');
    s.style.background = c;
    s.onclick = () => { link.color = c; save(); renderEditor(); };
    colorPicker.appendChild(s);
  });
  colorField.appendChild(colorPicker);
  item.appendChild(colorField);

  return item;
}

// ── Helpers ──
function sec(title) {
  const s = document.createElement('div');
  s.className = 'editor-section';
  s.innerHTML = `<h3>${title}</h3>`;
  return s;
}

function field(label, type, value, onChange, maxLen) {
  const f = document.createElement('div');
  f.className = 'editor-field';
  const l = document.createElement('label');
  l.textContent = label;
  const inp = document.createElement('input');
  inp.type = type;
  inp.value = value || '';
  if (maxLen) inp.maxLength = maxLen;
  inp.addEventListener('input', () => onChange(inp.value));
  f.appendChild(l);
  f.appendChild(inp);
  return f;
}

function textareaField(label, value, onChange) {
  const f = document.createElement('div');
  f.className = 'editor-field';
  const l = document.createElement('label');
  l.textContent = label;
  const ta = document.createElement('textarea');
  ta.value = value || '';
  ta.rows = 3;
  ta.addEventListener('input', () => onChange(ta.value));
  f.appendChild(l);
  f.appendChild(ta);
  return f;
}

function save() {
  saveConfig();
  renderPage();
}

// EDITOR TOGGLE
// ═══════════════════════════════════════════
// PIN AUTH + EDITOR TOGGLE
// ═══════════════════════════════════════════
const PIN_HASH = '5736'; // Editor PIN
let isAuthenticated = false;

const fab = document.getElementById('editFab');
const panel = document.getElementById('editorPanel');
const overlay = document.getElementById('editorOverlay');
const closeBtn = document.getElementById('editorClose');
const pinModal = document.getElementById('pinModal');
const pinInput = document.getElementById('pinInput');
const pinSubmit = document.getElementById('pinSubmit');
const pinCancel = document.getElementById('pinCancel');
const avatarEl_click = document.getElementById('avatar');

// Secret trigger: triple-click the avatar to open PIN modal
let clickCount = 0;
let clickTimer = null;
avatarEl_click.addEventListener('click', () => {
  if (isAuthenticated) return; // already unlocked
  clickCount++;
  clearTimeout(clickTimer);
  clickTimer = setTimeout(() => { clickCount = 0; }, 600);
  if (clickCount >= 3) {
    clickCount = 0;
    showPinModal();
  }
});

function showPinModal() {
  pinModal.classList.add('open');
  pinInput.value = '';
  pinInput.classList.remove('error');
  setTimeout(() => pinInput.focus(), 100);
}

function hidePinModal() {
  pinModal.classList.remove('open');
  pinInput.value = '';
}

function authenticate() {
  if (pinInput.value === PIN_HASH) {
    isAuthenticated = true;
    sessionStorage.setItem('linkme_auth', '1');
    hidePinModal();
    fab.classList.add('visible');
  } else {
    pinInput.classList.add('error');
    setTimeout(() => pinInput.classList.remove('error'), 500);
    pinInput.value = '';
    pinInput.focus();
  }
}

pinSubmit.addEventListener('click', authenticate);
pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') authenticate(); });
pinCancel.addEventListener('click', hidePinModal);
document.addEventListener('keydown', e => { if (e.key === 'Escape') { hidePinModal(); closeEditor(); } });

function openEditor() {
  panel.classList.add('open');
  overlay.classList.add('open');
  renderEditor();
}
function closeEditor() {
  panel.classList.remove('open');
  overlay.classList.remove('open');
}

fab.addEventListener('click', openEditor);
overlay.addEventListener('click', closeEditor);
closeBtn.addEventListener('click', closeEditor);

// ═══════════════════════════════════════════
// EXPORT SITE — bakes current config into a downloadable HTML
// ═══════════════════════════════════════════
function exportSite() {
  // Clone current page HTML
  const clone = document.documentElement.cloneNode(true);

  // Remove editor UI elements from the clone
  const removeSelectors = [
    '.edit-fab', '.editor-overlay', '.editor-panel', '.pin-modal'
  ];
  removeSelectors.forEach(sel => {
    const el = clone.querySelector(sel);
    if (el) el.remove();
  });

  // Update the default config in the script to match current config
  const scripts = clone.querySelectorAll('script');
  scripts.forEach(script => {
    if (script.textContent.includes('DEFAULT_CONFIG')) {
      // Replace the DEFAULT_CONFIG with current config values
      script.textContent = script.textContent.replace(
        /const DEFAULT_CONFIG = \{[\s\S]*?\n\};/,
        'const DEFAULT_CONFIG = ' + JSON.stringify(config, null, 2) + ';'
      );
    }
  });

  const html = '<!DOCTYPE html>\n' + clone.outerHTML;
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ═══════════════════════════════════════════
// DEPLOY TO GITHUB — pushes uploaded HTML to the repo
// ═══════════════════════════════════════════
const GH_REPO = 'miked1905-boop/mikebdetro.com';
const GH_FILE = 'index.html';
const GH_BRANCH = 'main';

function showDeployStatus(msg, type) {
  const el = document.getElementById('deployStatus');
  if (!el) return;
  el.textContent = msg;
  el.className = 'deploy-status show ' + type;
  if (type === 'success') setTimeout(() => { el.className = 'deploy-status'; }, 5000);
}

async function deployToGitHub(htmlContent) {
  const token = localStorage.getItem('linkme_gh_token');
  if (!token) {
    showDeployStatus('No GitHub token found. Set it up below.', 'error');
    return;
  }

  showDeployStatus('Deploying to mikebdetro.com...', 'loading');

  try {
    // Get current file SHA (needed for update)
    const getResp = await fetch(
      `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}`,
      { headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github+json' } }
    );

    if (!getResp.ok && getResp.status !== 404) {
      throw new Error('Failed to fetch file info: ' + getResp.status);
    }

    const getData = getResp.ok ? await getResp.json() : null;
    const sha = getData ? getData.sha : undefined;

    // Encode content to base64
    const encoded = btoa(unescape(encodeURIComponent(htmlContent)));

    // Push the file
    const putBody = {
      message: 'Update site via editor',
      content: encoded,
      branch: GH_BRANCH,
    };
    if (sha) putBody.sha = sha;

    const putResp = await fetch(
      `https://api.github.com/repos/${GH_REPO}/contents/${GH_FILE}`,
      {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(putBody),
      }
    );

    if (!putResp.ok) {
      const err = await putResp.json();
      throw new Error(err.message || 'Deploy failed');
    }

    showDeployStatus('Live! mikebdetro.com will update in ~1 min.', 'success');
  } catch (err) {
    showDeployStatus('Deploy failed: ' + err.message, 'error');
  }
}

}
